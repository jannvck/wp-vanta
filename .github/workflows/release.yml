name: Release Plugin

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create plugin zip
      run: |
        # Exclude .github, .gitignore, README.md, LICENSE from the zip
        zip -r wp-vanta.zip . -x ".github/*" ".gitignore" "README.md" "LICENSE"

    - name: Upload release asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./wp-vanta.zip
        asset_name: wp-vanta.zip
        asset_content_type: application/zip